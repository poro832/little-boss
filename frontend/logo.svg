<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g20t" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6" />
      <stop offset="100%" style="stop-color:#2563EB" />
    </linearGradient>
    <linearGradient id="g20l" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8" />
      <stop offset="100%" style="stop-color:#1E40AF" />
    </linearGradient>
    <linearGradient id="g20r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB" />
      <stop offset="100%" style="stop-color:#1D4ED8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="90" fill="#F8FAFC"/>

  <!-- Subtle dot pattern -->
  <g fill="#2563EB" opacity="0.04">
    <circle cx="50" cy="50" r="4"/><circle cx="100" cy="50" r="4"/>
    <circle cx="150" cy="50" r="4"/><circle cx="200" cy="50" r="4"/>
    <circle cx="250" cy="50" r="4"/><circle cx="300" cy="50" r="4"/>
    <circle cx="350" cy="50" r="4"/><circle cx="400" cy="50" r="4"/>
    <circle cx="450" cy="50" r="4"/>
  </g>

  <!-- 3D Cube - top face -->
  <path d="M256,80 L400,155 L256,230 L112,155 Z" fill="url(#g20t)"/>
  <!-- 3D Cube - left face -->
  <path d="M112,155 L256,230 L256,340 L112,265 Z" fill="url(#g20l)"/>
  <!-- 3D Cube - right face -->
  <path d="M256,230 L400,155 L400,265 L256,340 Z" fill="url(#g20r)"/>

  <!-- Document on top face -->
  <g transform="translate(256, 150)">
    <!-- Paper - isometric -->
    <path d="M-40,-25 L20,-55 L55,-35 L-5,-5 Z" fill="white" opacity="0.9"/>
    <!-- Lines -->
    <path d="M-25,-22 L15,-40" stroke="#BFDBFE" stroke-width="2.5"/>
    <path d="M-20,-15 L10,-33" stroke="#BFDBFE" stroke-width="2.5"/>
    <!-- Check -->
    <path d="M20,-20 L26,-13 L38,-28" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Calendar on right face -->
  <g transform="translate(340, 220)">
    <path d="M0,0 L40,-22 L40,-55 L0,-33 Z" fill="white" opacity="0.85"/>
    <path d="M0,-33 L40,-55 L40,-48 L0,-26 Z" fill="#EF4444" opacity="0.8"/>
    <text x="18" y="-8" text-anchor="middle" font-family="Arial" font-weight="700" font-size="16" fill="#EF4444" transform="skewY(-15)">31</text>
  </g>

  <!-- Checkmark on left face -->
  <g transform="translate(145, 220)">
    <circle cx="0" cy="0" r="22" fill="#10B981" opacity="0.85"/>
    <polyline points="-10,0 -4,8 10,-6" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Floating elements -->
  <g opacity="0.15">
    <rect x="70" y="100" width="20" height="25" rx="3" fill="#2563EB" transform="rotate(-10, 80, 112)"/>
    <rect x="420" y="110" width="18" height="22" rx="3" fill="#2563EB" transform="rotate(10, 429, 121)"/>
  </g>

  <!-- Text -->
  <text x="256" y="400" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-weight="900" font-size="58" fill="#1E1B4B" letter-spacing="-2">LittleBoss</text>

  <!-- Divider -->
  <rect x="155" y="415" width="202" height="2" rx="1" fill="#2563EB" opacity="0.2"/>

  <!-- Subtitle -->
  <text x="256" y="448" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="500" font-size="18" fill="#2563EB" letter-spacing="5">AI SECRETARY</text>

  <!-- Small accent dots -->
  <circle cx="148" cy="442" r="3" fill="#2563EB" opacity="0.3"/>
  <circle cx="364" cy="442" r="3" fill="#2563EB" opacity="0.3"/>
</svg>
