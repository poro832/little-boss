name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 공개 값(클라이언트에 노출되는 값) — 빌드 시 주입
      VITE_API_URL: https://7al1rzghkf.execute-api.ap-northeast-2.amazonaws.com/prod
      VITE_GOOGLE_CLIENT_ID: 889650272637-a0dfrs6froqhnkbchso0hjcq544u442d.apps.googleusercontent.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build (GitHub Pages base path)
        working-directory: frontend
        run: npm run build -- --base=/little-boss/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
